name: Daily README update

on:
  schedule:
    - cron: "40 18 * * *"   # 12:10 AM IST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update README with date (IST)
        run: |
          DATE_STR="$(TZ='Asia/Kolkata' date '+%A, %d %B %Y')"
          TIMESTAMP="$(TZ='Asia/Kolkata' date '+%H:%M:%S')"

          # Replace existing date line if present
          if grep -Eq '^(Monday|Tuesday|Wednesday|Thursday|Friday|Saturday|Sunday),' README.md; then
            sed -i -E "s/^(Monday|Tuesday|Wednesday|Thursday|Friday|Saturday|Sunday),.*/${DATE_STR}/" README.md
          else
            echo "" >> README.md
            echo "${DATE_STR}" >> README.md
          fi

          # Add timestamp comment to ensure change every run
          echo "<!-- updated ${TIMESTAMP} IST -->" >> README.md

      - name: Commit and push
        run: |
          git config user.name "Pratyush Raunak"
          git config user.email "YOUR_GITHUB_NOREPLY_EMAIL"

          git add README.md
          git commit -m "chore: daily README update"
          git push
