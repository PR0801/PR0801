name: Daily README update

on:
  schedule:name: Daily README Update

on:
  schedule:
    - cron: "40 18 * * *"   # 12:10 AM IST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update README with date (IST)
        run: |
          DATE_STR="$(TZ='Asia/Kolkata' date '+%A, %d %B %Y')"
          TIMESTAMP="$(TZ='Asia/Kolkata' date '+%H:%M:%S')"

          # Update or add date line
          if grep -Eq '^(Monday|Tuesday|Wednesday|Thursday|Friday|Saturday|Sunday),' README.md; then
            sed -i -E "s/^(Monday|Tuesday|Wednesday|Thursday|Friday|Saturday|Sunday),.*/${DATE_STR}/" README.md
          else
            echo "" >> README.md
            echo "${DATE_STR}" >> README.md
          fi

          # Update or add timestamp comment
          if grep -q '<!-- updated .* IST -->' README.md; then
            sed -i -E "s/<!-- updated .* IST -->/<!-- updated ${TIMESTAMP} IST -->/" README.md
          else
            echo "<!-- updated ${TIMESTAMP} IST -->" >> README.md
          fi

      - name: Commit and push changes
        run: |
          git config user.name "Pratyush Raunak"
          git config user.email "180762847+PR0801@users.noreply.github.com"

          git add README.md

          # Skip commit if no changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: daily README update"
          git push
    - cron: "40 18 * * *"   # 12:10 AM IST
  workflow_dispatch:

